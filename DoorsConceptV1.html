<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lojj Doors Prototype</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #5f7f5f, #2f4f2f);
    color: white;
    overflow-x: hidden;
  }

  .container {
    text-align: center;
    padding: 60px 20px;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 40px;
  }

  .doors {
    display: flex;
    justify-content: center;
    gap: 30px;
    position: relative;
  }

  .door {
    width: 120px;
    height: 180px;
    background: #ddd;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s ease;
    overflow: hidden;
  }

  /* "Open" effect */
  .door::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,255,200,0.8), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .door:hover {
    transform: perspective(400px) rotateY(-15deg);
  }

  .door:hover::before {
    opacity: 1;
  }

  .label {
    margin-top: 10px;
    font-size: 0.9rem;
  }

  /* Cart (stick figure placeholder) */
  .cart {
    width: 60px;
    height: 30px;
    background: black;
    border-radius: 6px;
    position: absolute;
    bottom: -60px;
    left: 0;
    transition: transform 0.5s ease;
  }

  .cart::after {
    content: "";
    position: absolute;
    bottom: -10px;
    left: 10px;
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    box-shadow: 30px 0 black;
  }

</style>
</head>

<body>

<div class="container">
  <h1>How Requests Get Done</h1>

  <div class="doors" id="doors">
    <div class="door" data-index="0"></div>
    <div class="door" data-index="1"></div>
    <div class="door" data-index="2"></div>
    <div class="door" data-index="3"></div>
    <div class="door" data-index="4"></div>
    <div class="door" data-index="5"></div>

    <div class="cart" id="cart"></div>
  </div>
</div>

<script>
  const doors = document.querySelectorAll(".door");
  const cart = document.getElementById("cart");

  doors.forEach((door, index) => {
    door.addEventListener("mouseenter", () => {
      const doorRect = door.getBoundingClientRect();
      const parentRect = door.parentElement.getBoundingClientRect();

      const offsetX = doorRect.left - parentRect.left;

      cart.style.transform = `translateX(${offsetX}px)`;
    });
  });
</script>

</body>
</html>
