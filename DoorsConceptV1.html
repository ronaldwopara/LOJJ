<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowtie Analysis Diagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .diagram-container {
            width: 100%;
            max-width: 1400px;
            overflow-x: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        svg {
            display: block;
            margin: 0 auto;
        }
        .text-box {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            padding: 8px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            background-color: white;
            border-radius: 6px;
        }
        .threat-box { border: 3px solid #ef4444; }
        .consequence-box { border: 3px solid #3b82f6; }
        .control-box { border: 2px solid #333; border-radius: 12px; font-weight: 500;}
        .hazard-box { background-color: #fde047; border: 2px solid #333; font-weight: bold; font-size: 14px;}
        .top-event {
            background-color: #ef4444;
            color: white;
            border: 2px solid #333;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }
        .svg-line {
            stroke: #1f2937;
            stroke-width: 3;
            fill: none;
        }
    </style>
</head>
<body>

<div class="diagram-container">
    <h1 class="text-3xl font-bold text-center text-slate-800 mb-8">Bowtie template #1</h1>
    
    <!-- SVG ViewBox mapped out to perfectly align nodes and lines -->
    <svg viewBox="0 0 1400 800" width="1400" height="800" xmlns="http://www.w3.org/2000/svg">
        
        <!-- ================= LINES ================= -->
        <!-- Center Vertical Line (Hazard to Top Event) -->
        <line x1="700" y1="220" x2="700" y2="340" class="svg-line" />

        <!-- Lines Row 1 (Threat 1 to Consequence 1) -->
        <line x1="190" y1="185" x2="250" y2="185" class="svg-line" />
        <line x1="390" y1="185" x2="450" y2="185" class="svg-line" />
        <line x1="590" y1="185" x2="650" y2="360" class="svg-line" />
        
        <line x1="750" y1="360" x2="830" y2="185" class="svg-line" />
        <line x1="970" y1="185" x2="1030" y2="185" class="svg-line" />
        <line x1="1170" y1="185" x2="1230" y2="185" class="svg-line" />

        <!-- Lines Row 2 (Threat 2 to Consequence 2) -->
        <line x1="190" y1="400" x2="250" y2="400" class="svg-line" />
        <line x1="390" y1="400" x2="450" y2="400" class="svg-line" />
        <line x1="590" y1="400" x2="600" y2="400" class="svg-line" />
        
        <line x1="800" y1="400" x2="830" y2="400" class="svg-line" />
        <line x1="970" y1="400" x2="1030" y2="400" class="svg-line" />
        <line x1="1170" y1="400" x2="1230" y2="400" class="svg-line" />

        <!-- Lines Row 3 (Threat 3 to Consequence 3) -->
        <line x1="190" y1="615" x2="250" y2="615" class="svg-line" />
        <line x1="390" y1="615" x2="450" y2="615" class="svg-line" />
        <line x1="590" y1="615" x2="650" y2="440" class="svg-line" />
        
        <line x1="750" y1="440" x2="830" y2="615" class="svg-line" />
        <line x1="970" y1="615" x2="1030" y2="615" class="svg-line" />
        <line x1="1170" y1="615" x2="1230" y2="615" class="svg-line" />


        <!-- ================= NODES (HTML Embedded in SVG) ================= -->
        
        <!-- HAZARD & TOP EVENT -->
        <foreignObject x="580" y="150" width="240" height="70">
            <div class="text-box hazard-box">HAZARD:<br/>Operating 3D Printed Motorized Prototype</div>
        </foreignObject>
        <foreignObject x="600" y="340" width="200" height="120">
            <div class="text-box top-event">TOP EVENT:<br/>Component Instability & Trajectory Loss</div>
        </foreignObject>

        <!-- THREATS (Left Column) -->
        <foreignObject x="50" y="150" width="140" height="70">
            <div class="text-box threat-box">THREAT 1:<br/>Unfixed Battery Box</div>
        </foreignObject>
        <foreignObject x="50" y="365" width="140" height="70">
            <div class="text-box threat-box">THREAT 2:<br/>Motor Vibrations</div>
        </foreignObject>
        <foreignObject x="50" y="580" width="140" height="70">
            <div class="text-box threat-box">THREAT 3:<br/>Drilling brittle PLA</div>
        </foreignObject>

        <!-- PCMs (Preventative Controls) -->
        <!-- Row 1 -->
        <foreignObject x="250" y="150" width="140" height="70">
            <div class="text-box control-box">PCM 1:<br/>Pre-modeled holes</div>
        </foreignObject>
        <foreignObject x="450" y="150" width="140" height="70">
            <div class="text-box control-box">PCM 2:<br/>Friction pads / Velcro</div>
        </foreignObject>
        <!-- Row 2 -->
        <foreignObject x="250" y="365" width="140" height="70">
            <div class="text-box control-box">PCM 1:<br/>Locknuts on fasteners</div>
        </foreignObject>
        <foreignObject x="450" y="365" width="140" height="70">
            <div class="text-box control-box">PCM 2:<br/>Vibration dampeners</div>
        </foreignObject>
        <!-- Row 3 -->
        <foreignObject x="250" y="580" width="140" height="70">
            <div class="text-box control-box">PCM 1:<br/>Parametric CAD design</div>
        </foreignObject>
        <foreignObject x="450" y="580" width="140" height="70">
            <div class="text-box control-box">PCM 2:<br/>Standardized beam mounts</div>
        </foreignObject>


        <!-- MCMs (Mitigating Controls) -->
        <!-- Row 1 -->
        <foreignObject x="830" y="150" width="140" height="70">
            <div class="text-box control-box">MCM 1:<br/>Under-chassis track guide</div>
        </foreignObject>
        <foreignObject x="1030" y="150" width="140" height="70">
            <div class="text-box control-box">MCM 2:<br/>Weight counterbalances</div>
        </foreignObject>
        <!-- Row 2 -->
        <foreignObject x="830" y="365" width="140" height="70">
            <div class="text-box control-box">MCM 1:<br/>Wide-catch station funnels</div>
        </foreignObject>
        <foreignObject x="1030" y="365" width="140" height="70">
            <div class="text-box control-box">MCM 2:<br/>Manual override protocol</div>
        </foreignObject>
        <!-- Row 3 -->
        <foreignObject x="830" y="580" width="140" height="70">
            <div class="text-box control-box">MCM 1:<br/>Safety Glasses (PPE)</div>
        </foreignObject>
        <foreignObject x="1030" y="580" width="140" height="70">
            <div class="text-box control-box">MCM 2:<br/>Modular swap-out design</div>
        </foreignObject>

        <!-- CONSEQUENCES (Right Column) -->
        <foreignObject x="1230" y="150" width="140" height="70">
            <div class="text-box consequence-box">CONSEQUENCE 1:<br/>Inadvertent Steering</div>
        </foreignObject>
        <foreignObject x="1230" y="365" width="140" height="70">
            <div class="text-box consequence-box">CONSEQUENCE 2:<br/>Track/Nav Failure</div>
        </foreignObject>
        <foreignObject x="1230" y="580" width="140" height="70">
            <div class="text-box consequence-box">CONSEQUENCE 3:<br/>PLA Breakage / Safety Risk</div>
        </foreignObject>

    </svg>
</div>

</body>
</html>
