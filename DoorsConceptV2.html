<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lojj Hallway Prototype</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(#3f5f3f, #1e2e1e);
    color: white;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    margin-top: 40px;
  }

  .hallway {
    position: relative;
    margin: 80px auto;
    /*width: min(1100px, 110vw);*/
    width: 90%;
    height: 420px;
    perspective: 900px;
    transform-style: preserve-3d;
    isolation: isolate;
  }

  .doors {
    position: absolute;
    left: 50%;
    top: 92px;
    transform: translateX(-50%);
    display: flex;
    gap: 54px;
    align-items: flex-start;
    z-index: 10;
  }

  /* Flat “cartoon hallway” scene (green palette) */
  .hallway::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(30, 70, 40, 0.95), rgba(14, 34, 22, 0.95));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    z-index: 0;
    pointer-events: none;
  }

  /* Baseboards 
  .hallway::after {
    content: "";
    position: absolute;
    left: 24px;
    right: 24px;
    bottom: 114px;
    height: 14px;
    border-radius: 10px;
    background: linear-gradient(180deg, rgba(230,240,230,0.35), rgba(15,25,18,0.35));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.22),
      0 10px 18px rgba(0,0,0,0.22);
    z-index: 1;
    pointer-events: none;
  }
*/
  .hallway .floor {
    position: absolute;
    left: -9%;
    right: -9%;
    bottom: 0;
    height: 17%;
    transform: none;
    background: linear-gradient(180deg, rgba(18, 48, 30, 1), rgba(8, 22, 14, 1));
    filter: saturate(0.9);
    opacity: 1;
    z-index: 2; /* floor covers wall beneath */
    pointer-events: none;
    clip-path: polygon(9% 0%, 91% 0%, 100% 100%, 0% 100%);
  }

  /* (intentionally simple floor – closer to ref #5) */

  /* FRAME */
  .frame {
    position: relative;
    width: 156px;         /* less tall + less skinny */
    height: 236px;
    padding: 8px;
    border-radius: 0px;
    background: rgba(8, 16, 12, 0.92); /* dark cavity */
    /*box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.08),
      inset 0 0 18px rgba(0,0,0,0.95),
      0 18px 28px rgba(0,0,0,0.35);*/
    transform: none;
    transform-style: preserve-3d;
    z-index: 10;
  }

  /* Door trim to match “frame within wall” look 
  .frame::after {
    content: "";
    position: absolute;
    inset: -12px;
    border-radius: 0px;
    background:
      linear-gradient(180deg, rgba(210, 230, 210, 0.20), rgba(5, 12, 8, 0.20));
    box-shadow:
      inset 0 0 0 2px rgba(220, 240, 220, 0.18),
      0 10px 18px rgba(0,0,0,0.20);
    z-index: -1;
    pointer-events: none;
  }
*/
  /* DOOR */
  .door {
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(235,235,235,0.98));
    border-radius: 0px;
    position: relative;
    transform-origin: left;
    transition: transform 1.75s cubic-bezier(.2,.8,.2,1);
    cursor: pointer;
    overflow: hidden;
    z-index: 2;
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,0.22),
      inset 0 -18px 24px rgba(0,0,0,0.10);
    outline: 2px solid rgba(10,16,12,0.75); /* sharp trace */
  }

  /* Inside darkness */
  .door::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #111;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* Door bevel + edge highlight so opening reads better */
  .door::before {
    content: "";
    position: absolute;
    inset: 0;
    /*background:
      linear-gradient(90deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.10) 12%,
        rgba(255,255,255,0.00) 40%,
        rgba(0,0,0,0.18) 100%);*/
    opacity: 0.65;
    pointer-events: none;
  }

  /* Simple handle */
  .door .handle {
    position: absolute;
    right: 16px;
    top: 50%;
    width: 16px;
    height: 6px;
    border-radius: 6px;
    transform: translateY(-50%);
    background: rgba(10,16,12,0.75);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10);
  }

  /* Doors closed by default; open on hover */
  .door {
    transform: perspective(900px) rotateY(0deg);
    will-change: transform;
  }

  /* ScrollTrigger will control door opening (no hover-open). */
  body.gsap-scroll .door {
    transition: none;
  }

  /* CART + STICKMAN */
  .cart-wrapper {
    position: absolute;
    bottom: 1%; /* keep clear of doors */
    left: 0;
    z-index: 50;
    will-change: transform;
    transform: translate3d(0, 0, 80px);
  }

  .cart-icon {
    width: 165px;
    height: 165px;
    object-fit: contain;
    display: block;
    image-rendering: auto;
    /* Applies to concierge-cart-idle.png (idle) and concierge-cart-gif-clear.gif (moving). */
    filter: invert(60%) drop-shadow(0 10px 14px rgba(0, 0, 0, 0.55));
    opacity: 0.95;
  }

  /* Flip concierge-cart when moving left */
  .facing-left .cart-icon {
    transform: scaleX(1);
    transform-origin: center;
  }

  /* Default faces left; flip when heading right */
  .cart-icon {
    transform: scaleX(-1);
    transform-origin: center;
  }

  .cart-bounce {
    transform: translateY(0);
    transform-origin: bottom;
  }

  svg {
    overflow: visible;
  }

  /* Wheel animation */
  .wheel {
    transform-origin: center;
    transform-box: fill-box;
    transition: transform 0.55s cubic-bezier(.2,.8,.2,1);
  }

  .moving .wheel {
    transform: rotate(360deg);
  }

  /* subtle bounce */
  .moving .cart-bounce {
    animation: bounce 0.55s ease;
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
    100% { transform: translateY(0); }
  }

</style>
</head>

<body>

<h1>How Requests Get Done</h1>

<div class="hallway" id="hallway">
  <div class="floor" aria-hidden="true"></div>

  <div class="doors" aria-label="doors row">
    <div class="frame" data-index="0"><div class="door"><span class="handle"></span></div></div>
    <div class="frame" data-index="1"><div class="door"><span class="handle"></span></div></div>
    <div class="frame" data-index="2"><div class="door"><span class="handle"></span></div></div>
    <div class="frame" data-index="3"><div class="door"><span class="handle"></span></div></div>
    <div class="frame" data-index="4"><div class="door"><span class="handle"></span></div></div>
    <div class="frame" data-index="5"><div class="door"><span class="handle"></span></div></div>
  </div>

  <!-- Stickman + Cart -->
  <div class="cart-wrapper" id="cart">
    <div class="cart-bounce">
      <img class="cart-icon" src="./public/concierge-cart-idle.png" alt="concierge with cart" />
    </div>
  </div>

</div>

<!-- Spacer: tall enough for the pinned ScrollTrigger distance (end) + breathing room. -->
<div style="min-height: 3200px;"></div>

<!-- GSAP (scroll-driven door opening) -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<script>
  const hallway = document.getElementById("hallway");
  const cart = document.getElementById("cart");
  const cartImg = cart.querySelector(".cart-icon");

  const CART_SRC_MOVING = "./public/concierge-cart-gif-clear.gif";
  const CART_SRC_IDLE = "./public/concierge-cart-idle.png";
  let lastMovingState = null;

  function setCartMovingVisual(isMoving) {
    if (lastMovingState === isMoving) return;
    lastMovingState = isMoving;

    cart.classList.toggle("moving", isMoving);
    if (cartImg) cartImg.src = isMoving ? CART_SRC_MOVING : CART_SRC_IDLE;
  }

  // Default to idle until we detect movement.
  setCartMovingVisual(false);

  const SCROLL_IDLE_MS = 240;
  let scrollIdleTimer = null;

  function isTypicalScrollKey(e) {
    const k = e.key;
    if (
      k !== "ArrowDown" &&
      k !== "ArrowUp" &&
      k !== "PageDown" &&
      k !== "PageUp" &&
      k !== "Home" &&
      k !== "End" &&
      k !== " " &&
      k !== "Spacebar"
    ) {
      return false;
    }
    const el = e.target;
    if (el && el.closest && el.closest("input, textarea, select, [contenteditable='true']")) {
      return false;
    }
    return true;
  }

  /** Moving GIF while the user is giving scroll-like input; idle shortly after it stops. */
  function noteScrollLikeInput() {
    setCartMovingVisual(true);
    window.clearTimeout(scrollIdleTimer);
    scrollIdleTimer = window.setTimeout(() => {
      scrollIdleTimer = null;
      setCartMovingVisual(false);
    }, SCROLL_IDLE_MS);
  }

  // Smooth cursor-follow so the concierge doesn't snap door-to-door.
  let currentX = 0;
  let targetX = 0;
  let lastX = 0;
  let rafId = null;

  function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  function updateTargetFromClientX(clientX) {
    const parent = hallway.getBoundingClientRect();
    const cartRect = cart.getBoundingClientRect();

    // Center the cart under the cursor, clamped within the hallway.
    const desired = (clientX - parent.left) - (cartRect.width / 2);
    targetX = clamp(desired, 0, Math.max(0, parent.width - cartRect.width));

    if (!rafId) rafId = window.requestAnimationFrame(tick);
  }

  function tick() {
    // Lower = slower movement.
    const ease = 0.005;
    currentX += (targetX - currentX) * ease;

    cart.style.transform = `translate3d(${currentX}px, 0, 80px)`;

    const speed = Math.abs(currentX - lastX);
    const remaining = Math.abs(targetX - currentX);

    // Determine facing direction from where it's heading (works even when moving very slowly).
    // Default is facing-left; when heading right we remove facing-left (so it flips).
    if (targetX > currentX + 0.5) cart.classList.remove("facing-left");
    else if (targetX < currentX - 0.5) cart.classList.add("facing-left");
    lastX = currentX;

    setCartMovingVisual(speed > 0.2 || remaining > 0.8);

    if (remaining > 0.2) rafId = window.requestAnimationFrame(tick);
    else rafId = null;
  }

  // Doors open left -> right on scroll.
  // If GSAP fails to load for any reason, the page still works (doors just stay closed).
  if (window.gsap && window.ScrollTrigger) {
    gsap.registerPlugin(ScrollTrigger);
    document.body.classList.add("gsap-scroll");

    const doors = gsap.utils.toArray(".frame .door");
    const frames = doors.map((d) => d.closest(".frame"));

    // Keep cart in the same 3D plane as before (translateZ 80px).
    gsap.set(cart, { x: 0, y: 0, z: 80, force3D: true });

    // Ensure consistent 3D transform origin and initial closed state.
    gsap.set(doors, {
      transformOrigin: "left center",
      transformPerspective: 900,
      rotationY: 0
    });

    function doorCenterXWithinHallway(frameEl) {
      const hallRect = hallway.getBoundingClientRect();
      const frameRect = frameEl.getBoundingClientRect();
      const cartRect = cart.getBoundingClientRect();
      const center = (frameRect.left - hallRect.left) + (frameRect.width / 2);
      const desired = center - (cartRect.width / 2);
      return clamp(desired, 0, Math.max(0, hallRect.width - cartRect.width));
    }

    // Cart idle/moving follows real scroll input (wheel, scroll, keys), not scrub deltas.
    window.addEventListener("wheel", noteScrollLikeInput, { passive: true });
    window.addEventListener("scroll", noteScrollLikeInput, { passive: true });
    window.addEventListener("keydown", (e) => {
      if (isTypicalScrollKey(e)) noteScrollLikeInput();
    });

    let lastGsapCartX = 0;
    const tl = gsap.timeline({
      defaults: { ease: "none" },
      scrollTrigger: {
        trigger: hallway,
        start: "top top",
        end: "+=2800",
        scrub: true,
        pin: true,
        invalidateOnRefresh: true,
        onUpdate: () => {
          const x = gsap.getProperty(cart, "x");
          const dx = x - lastGsapCartX;
          if (dx > 0.3) cart.classList.remove("facing-left");
          else if (dx < -0.3) cart.classList.add("facing-left");
          lastGsapCartX = x;
        }
      }
    });

    // Sequentially open each door as you scroll down.
    doors.forEach((door, i) => {
      // Move the cart to the door while it opens.
      tl.to(
        cart,
        { x: () => doorCenterXWithinHallway(frames[i]), duration: 1 },
        "+=0"
      );
      tl.to(door, { rotationY: -88, duration: 1 }, "<");
    });
  } else {
    // Fallback: mouse-driven cart movement if GSAP isn't available.
    hallway.addEventListener("mousemove", (e) => updateTargetFromClientX(e.clientX));
    hallway.addEventListener("mouseenter", (e) => updateTargetFromClientX(e.clientX));

    // When leaving the hallway, ease back to the left edge (optional, feels natural).
    hallway.addEventListener("mouseleave", () => {
      targetX = 0;
      if (!rafId) rafId = window.requestAnimationFrame(tick);
    });
  }
</script>

</body>
</html>
